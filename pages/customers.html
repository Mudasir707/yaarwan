<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    margin:0;
}

.header{
    background:#1e3a8a;
    color:white;
    padding:15px 20px;
}

.container{
    width:95%;
    max-width:1100px;
    margin:20px auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    background:#1e3a8a;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
}

th{
    background:#1e3a8a;
    color:white;
}

.action{
    background:#dc3545;
    padding:6px 12px;
}
</style>

</head>

<body>

<div class="header">
<h2>Customer Management</h2>
</div>

<div class="container">

<div class="card">

<h3>Add Customer</h3>

<input id="name" placeholder="Customer Name">

<input id="phone" placeholder="Phone Number">

<input id="city" placeholder="City">

<button onclick="addCustomer()">Save Customer</button>

<table>

<thead>

<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Action</th>
</tr>

</thead>

<tbody id="customerTable">
</tbody>

</table>

</div>

</div>

<script>
let customers=[];

function addCustomer(){

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const city=document.getElementById("city").value;

if(name==""){
alert("Enter customer name");
return;
}

customers.push({name,phone,city});

displayCustomers();

document.getElementById("name").value="";
document.getElementById("phone").value="";
document.getElementById("city").value="";
}

function displayCustomers(){

let html="";

customers.forEach((c,index)=>{

html+=`
<tr>

<td>${c.name}</td>

<td>${c.phone}</td>

<td>${c.city}</td>

<td>

<button class="action"
onclick="deleteCustomer(${index})">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById("customerTable").innerHTML=html;

}

function deleteCustomer(index){

customers.splice(index,1);

displayCustomers();

}
</script>

</body>
</html>
