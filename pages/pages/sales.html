<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Invoice</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
}
.header{
    background:#0d6efd;
    color:white;
    padding:15px;
}
.container{
    max-width:1100px;
    margin:20px auto;
}
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}
input{
    width:100%;
    padding:10px;
    margin-top:8px;
}
button{
    margin-top:15px;
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    border-radius:6px;
}
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:10px;
}
th{
    background:#0d6efd;
    color:white;
}
.total{
    font-size:22px;
    font-weight:bold;
    text-align:right;
    margin-top:15px;
}
</style>

</head>
<body>

<div class="header">
<h2>Sales Invoice</h2>
</div>

<div class="container">

<div class="card">

<div class="row">

<div>
<label>Customer</label>
<input id="customer">
</div>

<div>
<label>Invoice No</label>
<input id="invoice" value="INV-0001">
</div>

<div>
<label>Product</label>
<input id="product">
</div>

<div>
<label>Quantity</label>
<input id="qty" type="number">
</div>

<div>
<label>Rate</label>
<input id="rate" type="number">
</div>

</div>

<button onclick="addItem()">Add Item</button>

<table>

<thead>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Rate</th>
<th>Amount</th>
</tr>
</thead>

<tbody id="items"></tbody>

</table>

<div class="total">
Total : ₹ <span id="grandTotal">0</span>
</div>

</div>

</div>

<script>

let total=0;

function addItem(){

const product=document.getElementById("product").value;
const qty=Number(document.getElementById("qty").value);
const rate=Number(document.getElementById("rate").value);

const amount=qty*rate;

total+=amount;

document.getElementById("grandTotal").innerHTML=total;

document.getElementById("items").innerHTML+=`
<tr>
<td>${product}</td>
<td>${qty}</td>
<td>${rate}</td>
<td>${amount}</td>
</tr>
`;

document.getElementById("product").value="";
document.getElementById("qty").value="";
document.getElementById("rate").value="";

}

</script>

</body>
</html>
